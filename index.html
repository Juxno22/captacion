<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captación de Clientes</title>
  <link rel="stylesheet" href="./index.css">
  <link rel="icon" href="./logo.ico">
</head>

<body>
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <div class="logo-circle">D</div>
      <h1>Diagsa Automotriz</h1>
      <p class="subtitle">Acceso</p>
      <form id="loginForm">
        <div class="field">
          <label for="codigoEmpleado">Codigo Empleado</label>
          <input type="text" id="codigoEmpleado" placeholder="AAAA001" name="codigoEmpleado" required>
        </div>
        <button type="submit" class="btn-primary">Iniciar sesión</button>
      </form>
    </div>
  </div>

  <div class="app-wrap" id="appWrap">
    <div class="topbar">
      <div class="brand"><span class="dot"></span> Captación de Clientes</div> 
      <button class="logout-link" id="logoutBtn">Cerrar sesión</button>
    </div>

    <div class="card" id="formCard">
      <div class="headers">
        <h2>Codigo del capturista: </h2>
        <h2>
          <div class="codigoDisplay" id="codigoDisplay"></div>
        </h2>
      </div>
      <form id="clientForm">
        <div class="section-title">Datos del cliente</div>
        <div class="grid">
          <div class="field full">
            <label>Nombre completo</label>
            <input type="text" placeholder="Ej. Juan Pérez López" name="nombreCliente" required>
          </div>
          <div class="field">
            <label>¿De dónde nos visita?</label>
            <input type="text" placeholder="Ciudad / Estado" name="origen" required>
          </div>
          <div class="field">
            <label>Giro del cliente</label>
            <input type="text" placeholder="Ej. Refaccionaria, taller..." name="giro" required>
          </div>
          <div class="field">
            <label>Teléfono</label>
            <input type="tel" placeholder="2221234567" name="telefono" required>
          </div>
          <div class="field">
            <label>Correo electrónico</label>
            <input type="email" placeholder="cliente@correo.com" name="email">
          </div>
        </div>

        <div class="section-title">Datos de la empresa / negocio</div>
        <div class="grid">
          <div class="field full">
            <label>Razón social</label>
            <input type="text" placeholder="Nombre legal de la empresa / negocio" name="razonSocial">
          </div>
          <div class="field">
            <label>Persona moral o física</label>
            <select name="tipoPersona">
              <option value="">Selecciona una opción</option>
              <option value="personaFisica">Persona física</option>
              <option value="personaMoral">Persona moral</option>
            </select>
          </div>
          <div class="field">
            <label>Años de la empresa/negocio</label>
            <input type="number" min="0" placeholder="Ej. 5" name="aniosEmpresa">
          </div>
          <div class="field">
            <label>Años de experiencia en el rubro automotriz</label>
            <input type="number" min="0" placeholder="Ej. 8" name="aniosExperiencia">
          </div>
          <div class="field">
            <label>Cuántas sucursales tiene</label>
            <input type="number" min="0" placeholder="Ej. 2" name="sucursales">
          </div>
          <div class="field">
            <label>Personas que trae a la expo</label>
            <input type="number" min="1" placeholder="Ej. 3" name="acompaniantes">
          </div>
          <div class="field full">
            <label>Quiénes son sus proveedores actuales</label>
            <textarea placeholder="Ej. Proveedor A, Proveedor B..." name="proveedores"></textarea>
          </div>
        </div>

        <div class="section-title">Condiciones comerciales</div>
        <div class="grid">
          <div class="field">
            <label>Método de compra</label>
            <div class="pill-group">
              <label class="pill">
                <input type="radio" name="metodoCompra" value="Contado">
                <span>Contado</span>
              </label>
              <label class="pill">
                <input type="radio" name="metodoCompra" value="Credito">
                <span>Crédito</span>
              </label>
              <label class="pill">
                <input type="radio" name="metodoCompra" value="Mixto">
                <span>Mixto</span>
              </label>
            </div>
          </div>
          <div class="field">
            <label>Días de plazo (si compra a crédito)</label>
            <input type="number" min="0" placeholder="Ej. 30" name="diasPlazo">
          </div>
        </div>

        <div class="section-title">Sistemas</div>
        <div class="grid">
          <div class="field full">
            <label>Sistemas que trabaja</label>
            <div class="checkbox-grid">
              <div class="check-item"><input type="checkbox" id="sisEnfriamiento" name="sistemas"
                  value="enfriamiento"><label for="sisEnfriamiento">Enfriamiento</label></div>
              <div class="check-item"><input type="checkbox" id="sisRodamiento" name="sistemas"
                  value="rodamiento"><label for="sisRodamiento">Rodamiento</label></div>
              <div class="check-item"><input type="checkbox" id="sisSuspension" name="sistemas"
                  value="suspension"><label for="sisSuspension">Suspension</label></div>
              <div class="check-item"><input type="checkbox" id="sisFrenos" name="sistemas" value="frenos"><label
                  for="sisFrenos">Frenos</label></div>
              <div class="check-item"><input type="checkbox" id="sisDireccion" name="sistemas" value="direccion"><label
                  for="sisDireccion">Direccion</label></div>
              <div class="check-item"><input type="checkbox" id="sisTransmision" name="sistemas"
                  value="transmision"><label for="sisTransmision">Transmision</label></div>
              <div class="check-item"><input type="checkbox" id="sisElectrico" name="sistemas" value="electrico"><label
                  for="sisElectrico">Electrico</label></div>
              <div class="check-item"><input type="checkbox" id="sisClimatizacion" name="sistemas"
                  value="climatizacion"><label for="sisClimatizacion">Climatizacion</label></div>
              <div class="check-item"><input type="checkbox" id="sisMotor" name="sistemas" value="motor"><label
                  for="sisMotor">Motor</label></div>
              <div class="check-item"><input type="checkbox" id="sisCarroceria" name="sistemas" value="carrocerias"><label
                  for="sisCarroceria">Carrocerias</label></div>
              <div class="check-item"><input type="checkbox" id="sisLubricantes" name="sistemas" value="lubricantes"><label
                  for="sisLubricantes">Lubricantes</label></div>
              <div class="check-item"><input type="checkbox" id="sisAceites" name="sistemas" value="aceites"><label
                  for="sisAceites">Aceites y quimicos</label></div>
              <div class="check-item"><input type="checkbox" id="sisOtro" name="sistemas" value="Otro"><label
                  for="sisOtro">Otro</label></div>
            </div>
          </div>
          <div class="field full">
            <label>Sistema en el que se especializa</label>
            <input type="text" placeholder="Ej. Frenos y suspensión" name="especializacion" required>
          </div>
        </div>

        <div class="section-title">Clasificación del potencial del cliente</div>
        <div class="field">
          <div class="pill-group">
            <label class="pill low">
              <input type="radio" name="potencial" value="Bajo">
              <span>Bajo</span>
            </label>
            <label class="pill medium">
              <input type="radio" name="potencial" value="Medio">
              <span>Medio</span>
            </label>
            <label class="pill high">
              <input type="radio" name="potencial" value="Alto">
              <span>Alto</span>
            </label>
          </div>
        </div>

        <div class="actions">
          <button type="reset" class="btn-secondary">Limpiar</button>
          <button type="submit" class="btn-submit">Guardar prospecto</button>
        </div>
      </form>
    </div>

    <div class="card success-wrap" id="successCard">
      <div class="success-icon">✓</div>
      <h2>Prospecto guardado</h2>
      <p>La información del cliente se registró correctamente.</p>
      <button class="btn-submit" id="newClientBtn">Registrar otro cliente</button>
    </div>
  </div>
  <script src="./index.js"></script>
</body>

</html>
