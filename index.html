<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captación de Clientes</title>
  <link rel="stylesheet" href="./index.css">
  <link rel="icon" href="./logo.ico">
</head>

<body>
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <div class="logo-circle">D</div>
      <h1>Diagsa Automotriz</h1>
      <p class="subtitle">Acceso</p>
      <form id="loginForm">
        <div class="field">
          <label for="codigoEmpleado">Codigo Empleado</label>
          <input type="text" id="codigoEmpleado" placeholder="AAAA001" name="codigoEmpleado" required>
        </div>
        <button type="submit" class="btn-primary">Iniciar sesión</button>
      </form>
    </div>
  </div>

  <div class="app-wrap" id="appWrap">
    <div class="topbar">
      <div class="brand"><span class="dot"></span> Captación de Clientes</div> 
      <button class="logout-link" id="logoutBtn">Cerrar sesión</button>
    </div>

    <div class="card" id="formCard">
      <div class="headers">
        <h2>Codigo del capturista: </h2>
        <h2>
          <div class="codigoDisplay" id="codigoDisplay"></div>
        </h2>
      </div>
      <form id="clientForm">
        <div class="section-title">Datos del cliente</div>
        <div class="grid">
          <div class="field full">
            <label>Nombre completo</label>
            <input type="text" placeholder="Ej. Juan Pérez López" name="nombreCliente" required>
          </div>
          <div class="field">
            <label>¿De dónde nos visita?</label>
            <input type="text" placeholder="Ciudad / Estado" name="origen" required>
          </div>
          <div class="field">
            <label>Giro del cliente</label>
            <input type="text" placeholder="Ej. Refaccionaria, taller..." name="giro" required>
          </div>
          <div class="field">
            <label>Teléfono</label>
            <input type="tel" placeholder="2221234567" name="telefono" required>
          </div>
        </div>

        <div class="section-title">Datos de la empresa / negocio</div>
        <div class="grid">
          <div class="field full">
            <label>Razón social / Nombre del negocio</label>
            <input type="text" placeholder="Nombre de la empresa / negocio" name="razonSocial">
          </div>
          <div class="field">
            <label>Cuántas sucursales tiene</label>
            <input type="number" min="0" placeholder="Ej. 2" name="sucursales">
          </div>
          <div class="field">
            <label>Quiénes son sus proveedores actuales</label>
            <textarea placeholder="Ej. Proveedor A, Proveedor B..." name="proveedores"></textarea>
          </div>
        </div>

        <div class="section-title">Condiciones comerciales</div>
        <div class="grid">
          <div class="field">
            <label>Método de compra</label>
            <div class="pill-group">
              <label class="pill">
                <input type="radio" name="metodoCompra" value="Contado">
                <span>Contado</span>
              </label>
              <label class="pill">
                <input type="radio" name="metodoCompra" value="Credito">
                <span>Crédito</span>
              </label>
              <label class="pill">
                <input type="radio" name="metodoCompra" value="Mixto">
                <span>Mixto</span>
              </label>
            </div>
          </div>
          <div class="field">
            <label>Días de plazo (si compra a crédito)</label>
            <input type="number" min="0" placeholder="Ej. 30" name="diasPlazo">
          </div>
        </div>

        <div class="section-title">Sistemas</div>
        <div class="grid">
          <div class="field full">
            <label>Sistema que trabaja</label>
            <select name="sistemas" required>
              <option value="">Selecciona una opción</option>
              <option value="Mecánico en general">Mecánico en general</option>
              <option value="Refaccionaria en general">Refaccionaria en general</option>
              <option value="Enfriamiento">Enfriamiento</option>
              <option value="Rodamiento">Rodamiento</option>
              <option value="Suspensión">Suspensión</option>
              <option value="Frenos">Frenos</option>
              <option value="Dirección">Dirección</option>
              <option value="Transmisión">Transmisión</option>
              <option value="Eléctrico">Eléctrico</option>
              <option value="Climatización">Climatización</option>
              <option value="Motor">Motor</option>
              <option value="Carrocerías">Carrocerías</option>
              <option value="Lubricantes">Lubricantes</option>
              <option value="Aceites y químicos">Aceites y químicos</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
        </div>

        <div class="section-title">Clasificación del potencial del cliente</div>
        <div class="field">
          <div class="pill-group">
            <label class="pill low">
              <input type="radio" name="potencial" value="Bajo">
              <span>Bajo</span>
            </label>
            <label class="pill medium">
              <input type="radio" name="potencial" value="Medio">
              <span>Medio</span>
            </label>
            <label class="pill high">
              <input type="radio" name="potencial" value="Alto">
              <span>Alto</span>
            </label>
          </div>
        </div>

        <div class="actions">
          <button type="reset" class="btn-secondary">Limpiar</button>
          <button type="submit" class="btn-submit">Guardar prospecto</button>
        </div>
      </form>
    </div>

    <div class="card success-wrap" id="successCard">
      <div class="success-icon">✓</div>
      <h2>Prospecto guardado</h2>
      <p>La información del cliente se registró correctamente.</p>
      <button class="btn-submit" id="newClientBtn">Registrar otro cliente</button>
    </div>
  </div>
  <script src="./index.js"></script>
</body>

</html>
